apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment
spec:
  replicas: 1
  selector:
    matchLabels: { app: sentiment }
  template:
    metadata:
      labels: { app: sentiment }
    spec:
      containers:
        - name: sentiment
          image: us.icr.io/sn-labs-hoanganhdo23/sentiment:latest
          imagePullPolicy: Always
          ports: [{ containerPort: 5050 }]
          readinessProbe:
            httpGet: { path: /, port: 5050 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 5050 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { cpu: 250m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: sentiment
spec:
  selector: { app: sentiment }
  ports: [{ name: http, port: 5050, targetPort: 5050 }]
