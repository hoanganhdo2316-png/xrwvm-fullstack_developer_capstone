name: CI
on:
  push:
  pull_request:
jobs:
  django:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: server } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt flake8
      - run: flake8 djangoapp djangoproj --max-line-length=120 --exclude=migrations
      - run: python manage.py check
      - run: python manage.py makemigrations --check --dry-run
  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: server/frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18', cache: npm, cache-dependency-path: server/frontend/package-lock.json }
      - run: npm ci
      - run: npm run build
  express:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: server/database } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18' }
      - run: npm install
      - run: npm test
